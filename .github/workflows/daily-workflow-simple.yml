name: Daily 2+4 Workflow (Simplified)

on:
  schedule:
    - cron: '30 0 * * *'  # 每天 UTC 00:30 = 北京时间 08:30
  workflow_dispatch:  # 手动触发

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ========== 只保留 TrendRadar ==========
  
  trend-radar:
    name: TrendRadar (Multi-source)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: pip install feedparser requests beautifulsoup4
    
    - name: Fetch TrendRadar News
      env:
        DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        INTERESTS: ${{ secrets.INTERESTS }}
      run: |
        python sources/trend_radar.py --output output/trend_radar.md
    
    - name: Upload Output
      uses: actions/upload-artifact@v4
      with:
        name: trend-radar
        path: output/trend_radar.md

  # ========== JARVIS 整合 ==========
  
  jarvis-merge:
    name: JARVIS Merge & Save
    runs-on: ubuntu-latest
    needs: [trend-radar]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: '*'
        merge-multiple: true
        path: output/
    
    - name: Install dependencies
      run: pip install requests dashscope
    
    - name: JARVIS Merge (Save Only)
      env:
        DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        INTERESTS: ${{ secrets.INTERESTS }}
      run: |
        python jarvis/merge_simple.py
    
    - name: Commit Full Report
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add output/full/
        git diff --staged --quiet || git commit -m "Daily update: $(date +%Y-%m-%d)"
        git push || echo "No changes or push failed"
        echo "✅ Commit step completed"
